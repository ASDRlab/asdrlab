<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery | ASDR Lab</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Lightbox ── */
    #lb {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,.92);
      flex-direction: column;
      align-items: center; justify-content: center;
    }
    #lb.open { display: flex; }
    #lb-img {
      max-width: 90vw; max-height: 80vh;
      object-fit: contain;
      border-radius: 4px;
      transition: opacity .2s;
    }
    #lb-caption {
      color: rgba(255,255,255,.7);
      font-size: 13px; margin-top: 14px;
      text-align: center; min-height: 18px;
    }
    #lb-counter {
      color: rgba(255,255,255,.4);
      font-size: 12px; margin-top: 6px;
    }
    .lb-btn {
      position: fixed; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      padding: 16px; color: rgba(255,255,255,.7);
      font-size: 28px; line-height: 1;
      transition: color .15s;
    }
    .lb-btn:hover { color: #fff; }
    #lb-prev { left: 16px; }
    #lb-next { right: 16px; }
    #lb-close {
      position: fixed; top: 20px; right: 24px;
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,.7); font-size: 28px;
      line-height: 1; transition: color .15s;
    }
    #lb-close:hover { color: #fff; }

    /* ── Masonry grid ── */
    .gallery-count {
      font-size: 13px;
      color: #888;
      margin-bottom: 20px;
    }
    .masonry {
      columns: 3;
      column-gap: 8px;
    }
    @media (max-width: 768px) { .masonry { columns: 2; } }
    @media (max-width: 480px) { .masonry { columns: 1; } }

    .photo-item {
      break-inside: avoid;
      margin-bottom: 8px;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      background: #f0f0f0;
    }
    .photo-item img {
      width: 100%;
      display: block;
      opacity: 0;
      transition: opacity .3s;
    }
    .photo-item img.loaded { opacity: 1; }
    .photo-item .hover-caption {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0);
      display: flex; align-items: flex-end;
      padding: 12px;
      transition: background .2s;
    }
    .photo-item:hover .hover-caption {
      background: rgba(0,0,0,.3);
    }
    .hover-caption span {
      color: #fff;
      font-size: 12px;
      opacity: 0;
      transition: opacity .2s;
      text-shadow: 0 1px 3px rgba(0,0,0,.5);
    }
    .photo-item:hover .hover-caption span { opacity: 1; }

    /* skeleton */
    .skeleton {
      break-inside: avoid;
      margin-bottom: 8px;
      border-radius: 6px;
      background: #e8e8e8;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .5; }
    }

    .gallery-empty {
      text-align: center;
      padding: 60px 0;
      color: #aaa;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <!-- ── Lightbox ── -->
  <div id="lb" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <button id="lb-close" aria-label="Close">&#x2715;</button>
    <button class="lb-btn" id="lb-prev" aria-label="Previous">&#x2039;</button>
    <img id="lb-img" src="" alt="" />
    <p id="lb-caption"></p>
    <p id="lb-counter"></p>
    <button class="lb-btn" id="lb-next" aria-label="Next">&#x203a;</button>
  </div>

  <!-- ── Nav (기존 사이트와 동일) ── -->
  <header> <!-- 기존 nav 코드를 여기에 그대로 유지 --> </header>

  <!-- ── Main ── -->
  <main style="max-width: 1100px; margin: 0 auto; padding: 60px 24px 80px;">
    <div style="margin-bottom: 36px;">
      <p style="font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: .08em; margin: 0 0 8px;">Gallery</p>
      <h1 style="margin: 0 0 6px; font-size: 32px; font-weight: 600;">Lab in Photos.</h1>
      <p style="margin: 0; color: #666; font-size: 15px;">Conferences, lab events, and everyday moments.</p>
    </div>

    <p class="gallery-count" id="photo-count"></p>
    <div class="masonry" id="masonry"></div>
    <div class="gallery-empty" id="gallery-empty" style="display:none;">
      No photos yet.
    </div>
  </main>

  <!-- ── Footer (기존과 동일) ── -->
  <footer> <!-- 기존 footer 코드 --> </footer>

  <script>
    /* ════════════════════════════════════
       gallery.json 형식 (images/ 폴더 안에 저장):
       {
         "photos": [
           { "src": "images/gallery/photo1.jpg", "caption": "KST 2025" },
           { "src": "images/gallery/photo2.jpg", "caption": "랩 MT" },
           { "src": "images/gallery/photo3.jpg", "caption": "" }
         ]
       }
    ════════════════════════════════════ */

    const GALLERY_JSON = 'gallery.json'; // 경로 필요시 수정

    /* ── Lightbox ── */
    let LB = { photos: [], idx: 0 };

    function lbOpen(photos, idx) {
      LB.photos = photos; LB.idx = idx;
      lbRender();
      document.getElementById('lb').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function lbRender() {
      const img = document.getElementById('lb-img');
      img.style.opacity = 0;
      img.src = LB.photos[LB.idx].src;
      img.alt = LB.photos[LB.idx].caption || '';
      img.onload = () => { img.style.opacity = 1; };
      document.getElementById('lb-caption').textContent = LB.photos[LB.idx].caption || '';
      document.getElementById('lb-counter').textContent = `${LB.idx + 1} / ${LB.photos.length}`;
    }
    function lbClose() {
      document.getElementById('lb').classList.remove('open');
      document.body.style.overflow = '';
    }
    function lbStep(d) {
      LB.idx = (LB.idx + d + LB.photos.length) % LB.photos.length;
      lbRender();
    }

    document.getElementById('lb-close').onclick = lbClose;
    document.getElementById('lb-prev').onclick = e => { e.stopPropagation(); lbStep(-1); };
    document.getElementById('lb-next').onclick = e => { e.stopPropagation(); lbStep(1); };
    document.getElementById('lb').onclick = e => { if (e.target.id === 'lb') lbClose(); };
    document.addEventListener('keydown', e => {
      if (!document.getElementById('lb').classList.contains('open')) return;
      if (e.key === 'Escape')     lbClose();
      if (e.key === 'ArrowLeft')  lbStep(-1);
      if (e.key === 'ArrowRight') lbStep(1);
    });

    /* ── Skeleton placeholders ── */
    function showSkeletons(n = 12) {
      const grid = document.getElementById('masonry');
      grid.innerHTML = '';
      // 다양한 높이로 자연스러운 masonry 느낌
      const heights = [140, 200, 160, 220, 150, 180, 170, 210, 145, 190, 165, 200];
      for (let i = 0; i < n; i++) {
        const d = document.createElement('div');
        d.className = 'skeleton';
        d.style.height = heights[i % heights.length] + 'px';
        grid.appendChild(d);
      }
    }

    /* ── Build grid ── */
    function buildGrid(photos) {
      const grid = document.getElementById('masonry');
      grid.innerHTML = '';

      if (!photos.length) {
        document.getElementById('gallery-empty').style.display = 'block';
        return;
      }

      document.getElementById('photo-count').textContent = `${photos.length} photos`;

      photos.forEach((p, i) => {
        const item = document.createElement('div');
        item.className = 'photo-item';

        const img = document.createElement('img');
        img.src = p.src;
        img.alt = p.caption || '';
        img.decoding = 'async';
        img.loading = 'lazy';
        img.addEventListener('load',  () => img.classList.add('loaded'));
        img.addEventListener('error', () => { item.style.display = 'none'; });

        const cap = document.createElement('div');
        cap.className = 'hover-caption';
        if (p.caption) {
          const s = document.createElement('span');
          s.textContent = p.caption;
          cap.appendChild(s);
        }

        item.appendChild(img);
        item.appendChild(cap);
        item.addEventListener('click', () => lbOpen(photos, i));
        grid.appendChild(item);
      });
    }

    /* ── Load ── */
    async function init() {
      showSkeletons();
      try {
        const res = await fetch(GALLERY_JSON);
        if (!res.ok) throw new Error(res.status);
        const data = await res.json();
        buildGrid(data.photos || []);
      } catch (err) {
        console.warn('gallery.json 로드 실패:', err);
        document.getElementById('masonry').innerHTML = '';
        document.getElementById('gallery-empty').style.display = 'block';
        document.getElementById('gallery-empty').textContent =
          'gallery.json 파일을 확인해 주세요.';
      }
    }

    init();
  </script>
</body>
</html>
